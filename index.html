<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OURIDA Studios</title>
    <meta name="description" content="OURIDA Studios developer site for AdMob app-ads.txt verification." />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --card: rgba(255, 255, 255, 0.7);
        --ink: #173c31;
        --muted: #5d726a;
        --accent: #d4a32c;
      }
      html, body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.85), rgba(255,255,255,0.2) 32%, transparent 60%),
          linear-gradient(180deg, #d9c7aa, var(--bg));
        color: var(--ink);
      }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .card {
        max-width: 640px;
        width: 100%;
        background: var(--card);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(23, 60, 49, 0.1);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(23, 60, 49, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1;
      }
      p {
        margin: 0 0 14px;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
      }
      code {
        display: inline-block;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(23, 60, 49, 0.08);
        color: var(--ink);
        font-size: 0.95rem;
        word-break: break-word;
      }
      .accent {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="accent">Developer Site</div>
      <h1>OURIDA Studios</h1>
      <p>This site hosts the AdMob verification file for the app.</p>
      <p><strong>app-ads.txt</strong> is available at:</p>
      <p><code>/app-ads.txt</code></p>
    </main>
  </body>
  </html>
